<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      display: grid;
      place-items: center;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    #particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 10;
      max-width: 520px;
      padding: 20px;
    }

    .big-404 {
      font-size: clamp(9rem, 20vw, 14rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(90deg, #a78bfa, #7dd3fc, #34d399);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      user-select: none;
    }

    h2 {
      font-size: 2.1rem;
      margin: 0.4em 0 0.7em;
      font-weight: 500;
      opacity: 0.92;
    }

    .meme {
      font-size: 4.8rem;
      line-height: 1;
      margin: 0.3em 0 0.6em;
      filter: grayscale(30%) brightness(1.15);
    }

    .text {
      font-size: 1.24rem;
      opacity: 0.75;
      margin-bottom: 2.2rem;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 0.9em 2.1em;
      font-size: 1.1rem;
      color: #a78bfa;
      border: 1.5px solid #a78bfa55;
      border-radius: 999px;
      text-decoration: none;
      transition: all 0.22s ease;
      backdrop-filter: blur(6px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      background: #a78bfa22;
      color: white;
      border-color: #a78bfa;
      transform: translateY(-2px);
    }

    .falling {
      animation: fallAndDisappear 1.2s forwards;
      pointer-events: none;
    }

    @keyframes fallAndDisappear {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
    }

    .easter {
      position: fixed;
      bottom: 16px;
      right: 24px;
      font-size: 0.82rem;
      opacity: 0.28;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }

    @media (max-width: 480px) {
      .big-404 { font-size: clamp(7rem, 18vw, 11rem); }
      h2 { font-size: 1.7rem; }
      .meme { font-size: 3.8rem; }
      .buttons { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="content">
  <div class="big-404">404</div>
  <h2>Страница ушла в отпуск</h2>
  
  <div class="meme">¯\_(ツ)_/¯</div>
  
  <p class="text">
    Её здесь нет.<br>
    Но ты всё равно сюда попал.
  </p>

  <div class="buttons">
    <a href="/index.html" class="btn exit-btn">вернуться домой</a>
  </div>
</div>

<div class="easter">pssst... alt + 5</div>

<script>
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * w,
    y: Math.random() * h,
    radius: Math.random() * 1.8 + 0.4,
    speed: Math.random() * 0.4 + 0.1,
    alpha: Math.random() * 0.5 + 0.3
  });
}

function animate() {
  ctx.fillStyle = 'rgba(10,10,10,0.06)';
  ctx.fillRect(0, 0, w, h);

  ctx.fillStyle = '#ffffff';
  particles.forEach(p => {
    ctx.globalAlpha = p.alpha;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    ctx.fill();

    p.y += p.speed;
    if (p.y > h) {
      p.y = -10;
      p.x = Math.random() * w;
    }
  });

  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();

document.querySelectorAll('.exit-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.preventDefault();
    const href = btn.getAttribute('href');

    document.querySelectorAll('.btn').forEach(b => {
      b.classList.add('falling');
    });

    setTimeout(() => {
      if (href.startsWith('javascript')) {
        history.back();
      } else {
        window.location.href = href;
      }
    }, 1100);
  });
});

document.addEventListener('keydown', e => {
  if (e.altKey && e.key === '5') {
    document.body.style.background = `hsl(${Math.random()*360}, 70%, 8%)`;
    document.querySelector('.big-404').style.background = 
      `linear-gradient(90deg, hsl(${Math.random()*360},80%,65%), hsl(${Math.random()*360},80%,65%))`;
    document.querySelector('.big-404').style.webkitBackgroundClip = 'text';
    document.querySelector('.big-404').style.backgroundClip = 'text';
  }
});
</script>

</body>
</html>
